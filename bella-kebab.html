    // ── FadingVideo ─────────────────────────────────────────────────────────
    const FADE_MS       = 500;
    const FADE_LEAD     = 0.55;

    function FadingVideo({ src, className, style }) {
      const vRef = useRef(null);
      const raf  = useRef(null);
      const fOut = useRef(false);

      const fadeTo = useCallback((target) => {
        const v = vRef.current; if (!v) return;
        if (raf.current) cancelAnimationFrame(raf.current);
        const t0   = performance.now();
        const from = parseFloat(v.style.opacity) || 0;
        const tick = (now) => {
          const p = Math.min((now - t0) / FADE_MS, 1);
          v.style.opacity = String(from + (target - from) * p);
          if (p < 1) raf.current = requestAnimationFrame(tick);
        };
        raf.current = requestAnimationFrame(tick);
      }, []);

      useEffect(() => {
        const v = vRef.current; if (!v) return;
        v.style.opacity = "0";
        const onData = () => { v.play().catch(()=>{}); fadeTo(1); };
        const onTime = () => {
          if (!fOut.current && v.duration - v.currentTime <= FADE_LEAD && v.duration - v.currentTime > 0) {
            fOut.current = true; fadeTo(0);
          }
        };
        const onEnd = () => {
          v.style.opacity = "0";
          setTimeout(() => { v.currentTime = 0; v.play().catch(()=>{}); fOut.current = false; fadeTo(1); }, 80);
        };
        v.addEventListener("loadeddata", onData);
        v.addEventListener("timeupdate", onTime);
        v.addEventListener("ended",      onEnd);
        return () => {
          if (raf.current) cancelAnimationFrame(raf.current);
          v.removeEventListener("loadeddata", onData);
          v.removeEventListener("timeupdate", onTime);
          v.removeEventListener("ended",      onEnd);
        };
      }, [fadeTo]);

      return (
        <video ref={vRef} src={src} autoPlay muted playsInline preload="auto" loop={false}
          className={className} style={{ opacity: 0, ...style }} />
      );
    }

    // ── BlurText ────────────────────────────────────────────────────────────
    function BlurText({ text, className, baseDelay = 0, wordStep = 90 }) {
      const words = text.split(" ");
      const [vis, setVis] = useState(false);
      const ref = useRef(null);

      useEffect(() => {
        const io = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVis(true); io.disconnect(); } }, { threshold: 0.1 });
        if (ref.current) io.observe(ref.current);
        return () => io.disconnect();
      }, []);

      return (
        <span ref={ref} className={className}>
          {words.map((w, i) => (
            <span key={i} style={{
              display: "inline-block",
              opacity:   vis ? 1 : 0,
              filter:    vis ? "blur(0px)" : "blur(10px)",
              transform: vis ? "translateY(0)" : "translateY(8px)",
              transition: `opacity .7s ease ${(baseDelay + i * wordStep)/1000}s, filter .7s ease ${(baseDelay + i * wordStep)/1000}s, transform .65s ease ${(baseDelay + i * wordStep)/1000}s`,
              marginRight: ".22em",
            }}>{w}</span>
          ))}
        </span>
      );
    }

    // ── Card3D ──────────────────────────────────────────────────────────────
    function Card3D({ children, className = "", intensity = 10, style = {} }) {
      const rx = useMotionValue(0); const ry = useMotionValue(0);
      const srx = useSpring(rx, { stiffness: 300, damping: 30 });
      const sry = useSpring(ry, { stiffness: 300, damping: 30 });
      const sc  = useMotionValue(1);
      const ssc = useSpring(sc,  { stiffness: 300, damping: 30 });
      const ref = useRef(null);

      const onMove = useCallback((e) => {
        if (!ref.current) return;
        const r = ref.current.getBoundingClientRect();
        const x = (e.clientX - r.left)  / r.width  - 0.5;
        const y = (e.clientY - r.top)   / r.height - 0.5;
        rx.set(-y * intensity); ry.set(x * intensity); sc.set(1.025);
      }, [intensity]);

      const onLeave = useCallback(() => { rx.set(0); ry.set(0); sc.set(1); }, []);

      return (
        <div ref={ref} style={{ perspective: 1000, height: "100%" }} onMouseMove={onMove} onMouseLeave={onLeave}>
          <motion.div className={className} style={{ rotateX: srx, rotateY: sry, scale: ssc, transformStyle: "preserve-3d", height: "100%", ...style }}>
            {children}
          </motion.div>
        </div>
      );
    }

    // ── Navbar ──────────────────────────────────────────────────────────────
    function Navbar() {
      const [open,     setOpen]     = useState(false);

      const links = [

        { label: "Über uns",    href: "#about"   },
        { label: "Angebote",    href: "#offers"  },

      return (
        <motion.nav

          animate={{ y: 0,   opacity: 1 }}
          transition={{ duration: .8, ease: [.22,1,.36,1] }}
          style={{

            WebkitBackdropFilter: scrolled ? "blur(22px)"  : "none",

              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"1.55rem", fontWeight:500, color:"#F0E4CC", letterSpacing:".02em" }}>Bella Kebab</div>
              <div style={{ fontFamily:"'Karla',sans-serif", fontSize:".6rem", color:"#C8861A", letterSpacing:".22em", textTransform:"uppercase", marginTop:"1px" }}>Zürich · seit 2019</div>
            </a>

            {/* Desktop links */}
            <div style={{ display:"flex", gap:"2.25rem", alignItems:"center" }} className="hidden md:flex">
              {links.map(l => (
                <a key={l.href} href={l.href} className="nav-a"
                  style={{ fontFamily:"'Karla',sans-serif", fontSize:".84rem", fontWeight:500, color:"rgba(240,228,204,.7)", letterSpacing:".06em" }}
                  onMouseEnter={e=>e.currentTarget.style.color="#F0E4CC"}
                  onMouseLeave={e=>e.currentTarget.style.color="rgba(240,228,204,.7)"}

              ))}
              <a href={`tel:${TEL}`} className="btn-g px-5 py-2 rounded-full text-sm"
                style={{ fontFamily:"'Karla',sans-serif" }}>Anrufen</a>
            </div>

            {/* Hamburger */}
            <button onClick={()=>setOpen(!open)} className="md:hidden p-2" aria-label="Menü öffnen"
              style={{ background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", gap:"5px" }}>
              {[0,1,2].map(i=>(
                <span key={i} style={{
                  display:"block", width:22, height:1.5, background:"#F0E4CC", borderRadius:1, transition:"all .3s",
                  transform: open ? (i===0?"rotate(45deg) translate(4.5px,4.5px)" : i===2?"rotate(-45deg) translate(4.5px,-4.5px)" : "none") : "none",
                  opacity: open && i===1 ? 0 : 1,
                }} />
              ))}
            </button>
          </div>

          {/* Mobile menu */}
          <AnimatePresence>
            {open && (
              <motion.div initial={{opacity:0,height:0}} animate={{opacity:1,height:"auto"}} exit={{opacity:0,height:0}} transition={{duration:.3}}
                className="md:hidden lg rounded-2xl mt-3 overflow-hidden"
                style={{ border:"1px solid rgba(200,134,26,.2)" }}>
                <div style={{ display:"flex", flexDirection:"column", padding:"1rem", gap:"2px" }}>
                  {links.map(l=>(
                    <a key={l.href} href={l.href} onClick={()=>setOpen(false)}
                      style={{ fontFamily:"'Karla',sans-serif", fontSize:"1rem", color:"rgba(240,228,204,.8)", textDecoration:"none", padding:".7rem 1rem", borderRadius:".65rem", transition:"background .2s" }}
                      onMouseEnter={e=>e.currentTarget.style.background="rgba(200,134,26,.1)"}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}
                    >{l.label}</a>
                  ))}
                  <a href={`tel:${TEL}`} className="btn-g mt-2 py-3 rounded-xl text-sm"
                    style={{ fontFamily:"'Karla',sans-serif" }} onClick={()=>setOpen(false)}>
                    {TEL_D} · Anrufen
                  </a>
                </div>
              </motion.div>
            )}
          </AnimatePresence>
        </motion.nav>
      );
    }

    // ── HeroSection ─────────────────────────────────────────────────────────
    function HeroSection() {
      const { scrollY } = useScroll();
      const vy  = useTransform(scrollY, [0, 700], [0,  160]);
      const vs  = useTransform(scrollY, [0, 700], [1.18, 1.05]);

          </div>

          {/* Overlays */}

          {/* Content */}
          <motion.div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", textAlign:"center", padding:"0 1.5rem", y: cy, opacity: co }}>

            </motion.div>

            {/* Headline */}
            <h1 style={{ fontFamily:"'Cormorant Garamond',serif", fontWeight:300, fontSize:"clamp(3.8rem,11vw,9.5rem)", lineHeight:.88, letterSpacing:"-.02em", color:"#F0E4CC", marginBottom:".75rem" }}>

            {/* CTAs */}
            <motion.div initial={{opacity:0,y:16}} animate={{opacity:1,y:0}} transition={{duration:.7,delay:1.05}}

              <a href="#menu"      className="btn-g px-8 py-3.5 rounded-full text-sm tracking-widest uppercase" style={{fontFamily:"'Karla',sans-serif",minWidth:170}}>Speisekarte</a>
              <a href={`tel:${TEL}`} className="btn-o px-8 py-3.5 rounded-full text-sm tracking-widest uppercase" style={{fontFamily:"'Karla',sans-serif",minWidth:170}}>{TEL_D}</a>
            </motion.div>

            {/* Stats */}
            <motion.div initial={{opacity:0,y:20}} animate={{opacity:1,y:0}} transition={{duration:.7,delay:1.25}}
              style={{ display:"flex", gap:"1rem", marginTop:"3rem", flexWrap:"wrap", justifyContent:"center" }}>
              {[["18+","Jahre Erfahrung"],["100%","Halal zert."],["Täglich","Frisch gebacken"]].map(([v,l])=>(
                <div key={l} className="lg px-5 py-3 rounded-2xl" style={{ textAlign:"center", minWidth:100 }}>
                  <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"1.55rem", fontWeight:500, color:"#C8861A", lineHeight:1 }}>{v}</div>
                  <div style={{ fontFamily:"'Karla',sans-serif", fontSize:".62rem", color:"rgba(240,228,204,.5)", letterSpacing:".12em", textTransform:"uppercase", marginTop:4 }}>{l}</div>
                </div>

          {/* Scroll cue */}

              style={{ width:1, height:28, background:"linear-gradient(to bottom, rgba(200,134,26,.75), transparent)" }} />
          </motion.div>

    // ── FeaturesSection ──────────────────────────────────────────────────────
    const FEATURES = [

      { icon:"✦",  title:"Halal zertifiziert", body:"Alle Zutaten sind 100% halal. Das Zertifikat liegt bei uns im Restaurant und ist jederzeit auf Anfrage einsehbar." },
      { icon:"👨‍🍳",title:"Familiengeführt",  body:"Inhaber Noubar Abdulla steht seit 18 Jahren selbst am Herd — 6 davon mitten in Zürich. Hier kennt man seine Gäste mit Namen." },
    ];

    const MENU_CATS = [
      { icon:"🥙", name:"Kebab",            desc:"Döner, Dürüm, Lahmacun & mehr — täglich frisch mariniert, nach Hausrezept." },
      { icon:"🌿", name:"Vegi & Grill",     desc:"Vegetarische Spezialitäten und gegrillte Köstlichkeiten, direkt vom Grill." },

      { icon:"🥗", name:"Boxen & Salate",   desc:"Leichte Boxen und frische Salate — ideal für eine genussvolle Mittagspause." },

                      <span style={{ fontSize:"1.9rem", lineHeight:1, flexShrink:0, marginTop:2 }}>{c.icon}</span>
                      <div>
                        <h3 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"1.35rem", fontWeight:500, color:"#F0E4CC", marginBottom:".35rem" }}>{c.name}</h3>
                        <p style={{ fontFamily:"'Karla',sans-serif", fontSize:".82rem", color:"rgba(240,228,204,.55)", lineHeight:1.65 }}>{c.desc}</p>

              ))}
            </div>
            <motion.div initial={{opacity:0,y:16}} whileInView={{opacity:1,y:0}} viewport={{once:true}} transition={{duration:.6,delay:.3}} style={{ textAlign:"center", marginTop:"3.5rem" }}>
              <a href={`tel:${TEL}`} className="btn-g px-10 py-4 rounded-full text-sm tracking-widest uppercase"

          </div>
        </section>
      );
    }

    // ── AboutSection ─────────────────────────────────────────────────────────
    function AboutSection() {
      const secRef = useRef(null);
      const { scrollYProgress } = useScroll({ target: secRef, offset: ["start end","end start"] });
      const vy = useTransform(scrollYProgress, [0,1], [-55, 55]);

      return (
        <section id="about" ref={secRef} style={{ position:"relative", padding:"10rem 1.5rem", overflow:"hidden" }}>
          {/* BG video */}
          <motion.div style={{ position:"absolute", inset:0, y: vy, scale: 1.12 }}>
            <FadingVideo src={ABOUT_SRC} className="absolute inset-0 w-full h-full object-cover" />
          </motion.div>
          <div style={{ position:"absolute", inset:0, background:"linear-gradient(135deg, rgba(10,7,4,.93) 0%, rgba(10,7,4,.72) 50%, rgba(10,7,4,.9) 100%)" }} />

          <div style={{ position:"relative", maxWidth:1200, margin:"0 auto" }}>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
              {/* Left: story */}
              <motion.div initial={{opacity:0,x:-40}} whileInView={{opacity:1,x:0}} viewport={{once:true}} transition={{duration:.9}}>
                <p style={{ fontFamily:"'Karla',sans-serif", fontSize:".62rem", letterSpacing:".35em", textTransform:"uppercase", color:"#C8861A", marginBottom:"1.25rem" }}>Unsere Geschichte</p>
                <h2 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"clamp(2.4rem,5vw,3.5rem)", fontWeight:400, color:"#F0E4CC", lineHeight:1.12, marginBottom:"1.25rem" }}>
                  18 Jahre Leidenschaft<br /><em style={{fontStyle:"italic", fontWeight:300}}>für echten Kebab</em>
                </h2>
                <div className="divider" style={{ marginBottom:"2rem" }} />
                <p style={{ fontFamily:"'Karla',sans-serif", fontSize:".97rem", color:"rgba(240,228,204,.68)", lineHeight:1.85, marginBottom:"1.1rem" }}>
                  Noubar Abdulla eröffnete Bella Kebab mit einer einzigen Mission: echten, handgemachten Kebab so zuzubereiten, wie er sein soll — mit frischen Zutaten, sorgfältiger Würzung und echter Handwerkskunst, die man schmeckt.
                </p>
                <p style={{ fontFamily:"'Karla',sans-serif", fontSize:".97rem", color:"rgba(240,228,204,.68)", lineHeight:1.85 }}>
                  Seit 6 Jahren ist Bella Kebab fester Bestandteil des Quartiers an der Weinbergstrasse. Stammkunden schätzen die gleichbleibend hohe Qualität — und das Spezialbrot, das jeden Morgen frisch aus dem Ofen kommt.
                </p>
              </motion.div>

              {/* Right: fact tiles */}
              <motion.div initial={{opacity:0,x:40}} whileInView={{opacity:1,x:0}} viewport={{once:true}} transition={{duration:.9,delay:.18}}
                style={{ display:"flex", flexDirection:"column", gap:"1rem" }}>
                {[
                  ["18",    "Jahre Erfahrung in der Kebab-Küche"],
                  ["6",     "Jahre mitten in Zürich an der Weinbergstrasse"],
                  ["100%",  "Halal zertifizierte Zutaten — täglich frisch"],
                  ["∞",     "Stammkunden, die immer wieder gerne kommen"],
                ].map(([n,l],i)=>(
                  <motion.div key={n+l} initial={{opacity:0,x:28}} whileInView={{opacity:1,x:0}} viewport={{once:true}} transition={{duration:.6,delay:.3+i*.1}}
                    className="lgs rounded-2xl p-5" style={{ display:"flex", alignItems:"center", gap:"1.5rem" }}>
                    <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"2.4rem", fontWeight:300, color:"#C8861A", lineHeight:1, minWidth:64, textAlign:"right" }}>{n}</div>
                    <div style={{ width:1, height:36, background:"rgba(200,134,26,.3)", flexShrink:0 }} />
                    <p style={{ fontFamily:"'Karla',sans-serif", fontSize:".88rem", color:"rgba(240,228,204,.72)", lineHeight:1.5 }}>{l}</p>
                  </motion.div>
                ))}
              </motion.div>
            </div>
          </div>
        </section>
      );
    }

    // ── OffersSection ────────────────────────────────────────────────────────

      return (

            <SectionHeader eyebrow="Angebote" title="Besonderes für unsere Gäste" />

                  <div style={{ position:"absolute", top:-40, right:-40, width:200, height:200, background:"radial-gradient(circle, rgba(200,134,26,.15) 0%, transparent 70%)", pointerEvents:"none" }} />

                    <h3 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"clamp(2rem,4vw,2.75rem)", fontWeight:400, color:"#F0E4CC", lineHeight:1.15, marginBottom:"1.5rem" }}>
                      Günstig essen,<br /><em style={{fontStyle:"italic"}}>gut essen</em>
                    </h3>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:".75rem", marginBottom:"1.75rem" }}>
                      {["Reduzierter Preis","Gratis Getränk","Gratis Pommes"].map(item=>(
                        <span key={item} style={{ display:"inline-flex", alignItems:"center", gap:".35rem", padding:".45rem 1rem", background:"rgba(200,134,26,.09)", border:"1px solid rgba(200,134,26,.22)", borderRadius:999, fontFamily:"'Karla',sans-serif", fontSize:".82rem", color:"rgba(240,228,204,.82)" }}>

                      ))}
                    </div>
                    <p style={{ fontFamily:"'Karla',sans-serif", fontSize:".88rem", color:"rgba(240,228,204,.5)", lineHeight:1.7, maxWidth:480 }}>

                ].map((c,i)=>(
                  <motion.div key={c.title} initial={{opacity:0,x:28}} whileInView={{opacity:1,x:0}} viewport={{once:true}} transition={{duration:.6,delay:i*.15}} style={{ flex:1 }}>

                      <span style={{ fontSize:"1.7rem", display:"block", marginBottom:".7rem" }}>{c.icon}</span>
                      <h4 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"1.35rem", fontWeight:500, color:"#F0E4CC", marginBottom:".4rem" }}>{c.title}</h4>
                      <p style={{ fontFamily:"'Karla',sans-serif", fontSize:".82rem", color:"rgba(240,228,204,.52)", lineHeight:1.65 }}>{c.body}</p>
                    </Card3D>
                  </motion.div>
                ))}
              </div>
            </div>
          </div>
        </section>
      );
    }

                  <span style={{ fontSize:"1.7rem", display:"block", marginBottom:"1.25rem" }}>📍</span>

                  <p style={{ fontFamily:"'Karla',sans-serif", fontSize:"1rem", color:"rgba(240,228,204,.78)", lineHeight:1.75, marginBottom:"1.75rem" }}>

              <motion.div initial={{opacity:0,y:30}} whileInView={{opacity:1,y:0}} viewport={{once:true}} transition={{duration:.7,delay:.28}}>

                  <a href={`tel:${TEL}`} style={{ display:"block", fontFamily:"'Cormorant Garamond',serif", fontSize:"1.9rem", fontWeight:400, color:"#C8861A", textDecoration:"none", marginBottom:".5rem", transition:"color .2s" }}

                  <a href={`tel:${TEL}`} className="btn-g px-5 py-2.5 rounded-full text-sm"
                    style={{ fontFamily:"'Karla',sans-serif", letterSpacing:".05em" }}>Jetzt anrufen</a>
                </div>
              </motion.div>
            </div>

            {/* Map */}
            <motion.div initial={{opacity:0,y:20}} whileInView={{opacity:1,y:0}} viewport={{once:true}} transition={{duration:.8,delay:.2}}
              className="lg rounded-3xl overflow-hidden" style={{ marginTop:"2rem", height:320, border:"1px solid rgba(200,134,26,.15)" }}>
              <iframe
                title="Bella Kebab Standort"
                src="https://www.openstreetmap.org/export/embed.html?bbox=8.529%2C47.378%2C8.542%2C47.385&layer=mapnik&marker=47.3815%2C8.5355"
                width="100%" height="100%"
                style={{ border:0, display:"block", filter:"invert(92%) hue-rotate(180deg) brightness(.88) contrast(.88) saturate(.7)" }}
                loading="lazy" />
            </motion.div>
          </div>
        </section>
      );
    }

    // ── Footer ───────────────────────────────────────────────────────────────
    function Footer() {
      const cols = [
        { head:"Navigation", items:[["#menu","Speisekarte"],["#about","Über uns"],["#offers","Angebote"],["#contact","Kontakt"]] },
        { head:"Erreichbarkeit", items:[[`tel:${TEL}`,TEL_D],[`mailto:${EMAIL}`,EMAIL],["#","Weinbergstrasse 26, 8001 Zürich"]] },
      ];
      return (
        <footer style={{ background:"#070503", borderTop:"1px solid rgba(200,134,26,.1)", padding:"3.5rem 1.5rem 2rem" }}>
          <div style={{ maxWidth:1200, margin:"0 auto" }}>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-10" style={{ marginBottom:"2.5rem" }}>
              {/* Brand */}

                <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"1.75rem", fontWeight:500, color:"#F0E4CC", lineHeight:1 }}>Bella Kebab</div>
                <div style={{ fontFamily:"'Karla',sans-serif", fontSize:".58rem", color:"#C8861A", letterSpacing:".22em", textTransform:"uppercase", margin:".3rem 0 1rem" }}>Zürich · seit 2019</div>
                <p style={{ fontFamily:"'Karla',sans-serif", fontSize:".82rem", color:"rgba(240,228,204,.35)", lineHeight:1.75, maxWidth:220 }}>Täglich frisch, immer halal — das Vertrauen unserer Stammkunden seit Jahren.</p>
              </div>
              {cols.map(col=>(
                <div key={col.head}>
                  <p style={{ fontFamily:"'Karla',sans-serif", fontSize:".6rem", letterSpacing:".2em", textTransform:"uppercase", color:"rgba(240,228,204,.28)", marginBottom:"1rem" }}>{col.head}</p>
                  <div style={{ display:"flex", flexDirection:"column", gap:".5rem" }}>
                    {col.items.map(([href,label])=>(
                      <a key={href} href={href} style={{ fontFamily:"'Karla',sans-serif", fontSize:".88rem", color:"rgba(240,228,204,.48)", textDecoration:"none", transition:"color .2s", wordBreak:"break-all" }}
                        onMouseEnter={e=>e.currentTarget.style.color="#C8861A"} onMouseLeave={e=>e.currentTarget.style.color="rgba(240,228,204,.48)"}>{label}</a>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ borderTop:"1px solid rgba(200,134,26,.07)", paddingTop:"1.5rem", display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:".5rem" }}>
              <p style={{ fontFamily:"'Karla',sans-serif", fontSize:".72rem", color:"rgba(240,228,204,.22)" }}>© 2026 Bella Kebab. Alle Rechte vorbehalten.</p>
              <p style={{ fontFamily:"'Karla',sans-serif", fontSize:".72rem", color:"rgba(240,228,204,.18)" }}>Weinbergstrasse 26 · 8001 Zürich</p>
            </div>
          </div>
        </footer>
      );
    }

    // ── SectionHeader (shared) ───────────────────────────────────────────────
    function SectionHeader({ eyebrow, title, sub }) {
      return (
        <motion.div initial={{opacity:0,y:30}} whileInView={{opacity:1,y:0}} viewport={{once:true}} transition={{duration:.8}}
          style={{ textAlign:"center", marginBottom:0 }}>
          <p style={{ fontFamily:"'Karla',sans-serif", fontSize:".62rem", letterSpacing:".35em", textTransform:"uppercase", color:"#C8861A", marginBottom:"1rem" }}>{eyebrow}</p>
          <h2 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"clamp(2.4rem,5vw,3.75rem)", fontWeight:400, color:"#F0E4CC", lineHeight:1.1 }}>{title}</h2>
          <div className="divider" style={{ margin:"1.5rem auto 0" }} />
          {sub && <p style={{ fontFamily:"'Karla',sans-serif", fontSize:".92rem", color:"rgba(240,228,204,.5)", marginTop:"1.25rem", maxWidth:480, margin:"1.25rem auto 0" }}>{sub}</p>}
        </motion.div>
      );
    }

    // ── App ──────────────────────────────────────────────────────────────────
    function App() {
      return (
        <React.Fragment>
          <Navbar />
          <main>
            <HeroSection />
            <FeaturesSection />
            <MenuSection />
            <AboutSection />
            <OffersSection />
            <ContactSection />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
